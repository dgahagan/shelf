{% extends "base.html" %}
{% block title %}Browse — Shelf{% endblock %}
{% block content %}
<div x-data="browsePage()">
    <!-- Bulk Action Bar -->
    <div x-show="selectMode && selectedIds.length > 0" x-transition
         class="fixed bottom-0 inset-x-0 z-40 bg-shelf-card border-t border-shelf-border py-3 px-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex items-center gap-3 flex-wrap">
            <span class="text-sm text-shelf-muted" x-text="selectedIds.length + ' selected'"></span>
            <select x-model="bulkLocationVal" class="bg-shelf-bg border border-shelf-border rounded-lg px-2 py-1 text-sm text-shelf-text">
                <option value="">Move to location...</option>
                {% for loc in locations %}
                <option value="{{ loc.id }}">{{ loc.name }}</option>
                {% endfor %}
            </select>
            <button @click="bulkUpdate({location_id: parseInt(bulkLocationVal) || null})" x-show="bulkLocationVal"
                    class="px-3 py-1 bg-shelf-accent text-white rounded-lg text-xs">Apply</button>
            <select x-model="bulkTypeVal" class="bg-shelf-bg border border-shelf-border rounded-lg px-2 py-1 text-sm text-shelf-text">
                <option value="">Change type...</option>
                {% for key, label in media_types.items() %}
                <option value="{{ key }}">{{ label }}</option>
                {% endfor %}
            </select>
            <button @click="bulkUpdate({media_type: bulkTypeVal})" x-show="bulkTypeVal"
                    class="px-3 py-1 bg-shelf-accent text-white rounded-lg text-xs">Apply</button>
            <button @click="bulkDelete()" class="px-3 py-1 bg-shelf-error/20 text-shelf-error rounded-lg text-xs ml-auto">Delete Selected</button>
        </div>
    </div>

    <!-- Header + Filters -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div class="flex items-center gap-3">
            <h1 class="text-2xl font-bold">Collection <span id="collection-count" class="text-shelf-muted text-lg font-normal">({{ total_count }})</span></h1>
            <button @click="selectMode = !selectMode; if(!selectMode) selectedIds = []"
                    :class="selectMode ? 'bg-shelf-accent/20 text-shelf-accent2' : 'bg-shelf-card text-shelf-muted'"
                    class="px-3 py-1 rounded-lg text-xs border border-shelf-border hover:border-shelf-accent/50 transition-colors">
                <span x-text="selectMode ? 'Done' : 'Select'"></span>
            </button>
            <template x-if="selectMode">
                <div class="flex items-center gap-1">
                    <button @click="selectAll()" class="px-2 py-1 rounded text-xs text-shelf-muted hover:text-shelf-accent2 transition-colors">Select All</button>
                    <button @click="deselectAll()" x-show="selectedIds.length > 0" class="px-2 py-1 rounded text-xs text-shelf-muted hover:text-shelf-accent2 transition-colors">Deselect All</button>
                </div>
            </template>
        </div>
        <div class="flex flex-wrap items-center gap-3">
            <!-- Search -->
            <input type="search" name="q" placeholder="Search..." value="{{ initial_query or '' }}"
                   hx-get="/api/search" hx-trigger="keyup changed delay:300ms" hx-target="#item-grid"
                   hx-include="[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='owned'],[name='lent_out']"
                   class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent focus:border-transparent outline-none placeholder-shelf-muted/50 w-48">

            {% set f = initial_filters or {} %}
            <!-- Media Type Filter -->
            <select id="type-filter" name="media_type_filter"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='owned'],[name='lent_out']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="" {{ 'selected' if not f.media_type_filter else '' }}>All Types ({{ total_count }})</option>
                {% for key, label in media_types.items() %}
                {% set count = type_counts.get(key, 0) %}
                {% if count > 0 %}
                <option value="{{ key }}" {{ 'selected' if f.media_type_filter == key else '' }}>{{ label }} ({{ count }})</option>
                {% endif %}
                {% endfor %}
            </select>

            <!-- Location Filter -->
            <select name="location_filter"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='media_type_filter'],[name='sort'],[name='reading_status'],[name='owned'],[name='lent_out']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="" {{ 'selected' if not f.location_filter else '' }}>All Locations</option>
                {% for loc in locations %}
                <option value="{{ loc.id }}" {{ 'selected' if f.location_filter == loc.id|string else '' }}>{{ loc.name }}</option>
                {% endfor %}
            </select>

            <!-- Owned / Wishlist Filter -->
            <select id="owned-filter" name="owned"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='lent_out']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="" {{ 'selected' if not f.owned else '' }}>All ({{ total_count }})</option>
                <option value="1" {{ 'selected' if f.owned == '1' else '' }}>Owned ({{ owned_count }})</option>
                <option value="0" {{ 'selected' if f.owned == '0' else '' }}>Wishlist ({{ wishlist_count }})</option>
            </select>

            <!-- Lent Out Filter -->
            <select name="lent_out"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='owned']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="" {{ 'selected' if not f.lent_out else '' }}>All Items</option>
                <option value="1" {{ 'selected' if f.lent_out == '1' else '' }}>Lent Out{% if lent_out_count %} ({{ lent_out_count }}){% endif %}</option>
            </select>

            <!-- Reading Status Filter -->
            <select name="reading_status"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='owned'],[name='lent_out']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="" {{ 'selected' if not f.reading_status else '' }}>All Statuses</option>
                <option value="want_to_read" {{ 'selected' if f.reading_status == 'want_to_read' else '' }}>Want to Read</option>
                <option value="reading" {{ 'selected' if f.reading_status == 'reading' else '' }}>Reading</option>
                <option value="read" {{ 'selected' if f.reading_status == 'read' else '' }}>Read</option>
            </select>

            <!-- Sort -->
            <select name="sort"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='media_type_filter'],[name='location_filter'],[name='reading_status'],[name='owned'],[name='lent_out']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="newest" {{ 'selected' if f.sort == 'newest' or not f.sort else '' }}>Most Recent</option>
                <option value="oldest" {{ 'selected' if f.sort == 'oldest' else '' }}>Oldest First</option>
                <option value="title_asc" {{ 'selected' if f.sort == 'title_asc' else '' }}>Title A–Z</option>
                <option value="title_desc" {{ 'selected' if f.sort == 'title_desc' else '' }}>Title Z–A</option>
                <option value="author" {{ 'selected' if f.sort == 'author' else '' }}>Author</option>
                <option value="year_desc" {{ 'selected' if f.sort == 'year_desc' else '' }}>Year (Newest)</option>
                <option value="year_asc" {{ 'selected' if f.sort == 'year_asc' else '' }}>Year (Oldest)</option>
            </select>
        </div>
    </div>

    <!-- Active Filter Pills -->
    <div x-show="filterPills.length > 0" x-transition class="flex flex-wrap items-center gap-2 mb-4">
        <template x-for="pill in filterPills" :key="pill.name">
            <span class="inline-flex items-center gap-1 px-2.5 py-1 bg-shelf-accent/10 text-shelf-accent2 border border-shelf-accent/20 rounded-full text-xs">
                <span x-text="pill.label"></span>
                <button @click="clearFilter(pill.name)" class="hover:text-shelf-text ml-0.5">&times;</button>
            </span>
        </template>
        <button @click="clearAllFilters()" class="text-xs text-shelf-muted hover:text-shelf-error transition-colors ml-1">Clear all</button>
    </div>

    <!-- Item Grid -->
    <div id="item-grid">
        {% include "fragments/item_grid.html" %}
    </div>
</div>

<script>
function browsePage() {
    return {
        selectMode: false,
        selectedIds: [],
        bulkLocationVal: '',
        bulkTypeVal: '',
        filterPills: [],

        init() {
            this.syncFilters();
            // Sync filter pills and URL after every HTMX swap
            document.body.addEventListener('htmx:afterSettle', () => {
                this.syncFilters();
                this.updateUrl();
            });
        },

        syncFilters() {
            var pills = [];
            var filterDefs = [
                {name: 'q', prefix: 'Search'},
                {name: 'media_type_filter', prefix: 'Type'},
                {name: 'location_filter', prefix: 'Location'},
                {name: 'owned', prefix: ''},
                {name: 'lent_out', prefix: ''},
                {name: 'reading_status', prefix: 'Status'},
                {name: 'sort', prefix: 'Sort', skip: 'newest'},
            ];
            filterDefs.forEach(function(def) {
                var el = document.querySelector('[name="' + def.name + '"]');
                if (!el || !el.value || el.value === (def.skip || '')) return;
                var label;
                if (el.tagName === 'SELECT') {
                    var opt = el.options[el.selectedIndex];
                    label = opt ? opt.text.replace(/ \(\d+\)$/, '') : el.value;
                } else {
                    label = def.prefix ? def.prefix + ': ' + el.value : el.value;
                }
                if (def.prefix && el.tagName === 'SELECT') label = def.prefix + ': ' + label;
                pills.push({name: def.name, label: label});
            });
            this.filterPills = pills;
        },

        updateUrl() {
            var params = new URLSearchParams();
            var names = ['q', 'media_type_filter', 'location_filter', 'sort', 'reading_status', 'owned', 'lent_out'];
            names.forEach(function(name) {
                var el = document.querySelector('[name="' + name + '"]');
                if (!el) return;
                if (name === 'sort' && el.value === 'newest') return;
                if (el.value) params.set(name, el.value);
            });
            var qs = params.toString();
            var url = window.location.pathname + (qs ? '?' + qs : '');
            history.replaceState(null, '', url);
        },

        clearFilter(name) {
            var el = document.querySelector('[name="' + name + '"]');
            if (el) {
                el.value = name === 'sort' ? 'newest' : '';
                htmx.trigger(el, el.tagName === 'SELECT' ? 'change' : 'keyup');
            }
        },

        clearAllFilters() {
            var names = ['q', 'media_type_filter', 'location_filter', 'reading_status', 'owned', 'lent_out'];
            names.forEach(function(name) {
                var el = document.querySelector('[name="' + name + '"]');
                if (el) el.value = '';
            });
            var sort = document.querySelector('[name="sort"]');
            if (sort) sort.value = 'newest';
            var trigger = document.querySelector('[name="media_type_filter"]') || document.querySelector('[name="q"]');
            if (trigger) htmx.trigger(trigger, 'change');
        },

        toggleItem(id) {
            var idx = this.selectedIds.indexOf(id);
            if (idx >= 0) this.selectedIds.splice(idx, 1);
            else this.selectedIds.push(id);
        },

        selectAll() {
            var self = this;
            document.querySelectorAll('[data-item-id]').forEach(function(el) {
                var id = parseInt(el.dataset.itemId);
                if (self.selectedIds.indexOf(id) < 0) self.selectedIds.push(id);
            });
        },

        deselectAll() {
            this.selectedIds = [];
        },

        async bulkUpdate(updates) {
            if (!this.selectedIds.length) return;
            try {
                var resp = await fetch('/api/items/bulk-update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({item_ids: this.selectedIds, updates: updates})
                });
                var data = await resp.json();
                if (data.ok) {
                    showToast('Updated ' + data.updated + ' items', 'success');
                    this.selectedIds = [];
                    location.reload();
                } else {
                    showToast(data.message || 'Update failed', 'error');
                }
            } catch (e) {
                showToast('Update failed: ' + e.message, 'error');
            }
        },

        async bulkDelete() {
            if (!confirm('Delete ' + this.selectedIds.length + ' items?')) return;
            for (var id of this.selectedIds) {
                await fetch('/api/items/' + id, {method: 'DELETE'});
            }
            showToast('Deleted ' + this.selectedIds.length + ' items', 'success');
            this.selectedIds = [];
            location.reload();
        }
    }
}
</script>
{% endblock %}
