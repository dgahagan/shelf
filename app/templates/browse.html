{% extends "base.html" %}
{% block title %}Browse — Shelf{% endblock %}
{% block content %}
<div x-data="browsePage()">
    <!-- Bulk Action Bar -->
    <div x-show="selectMode && selectedIds.length > 0" x-transition
         class="fixed bottom-0 inset-x-0 z-40 bg-shelf-card border-t border-shelf-border py-3 px-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex items-center gap-3 flex-wrap">
            <span class="text-sm text-shelf-muted" x-text="selectedIds.length + ' selected'"></span>
            <select x-model="bulkLocationVal" class="bg-shelf-bg border border-shelf-border rounded-lg px-2 py-1 text-sm text-shelf-text">
                <option value="">Move to location...</option>
                {% for loc in locations %}
                <option value="{{ loc.id }}">{{ loc.name }}</option>
                {% endfor %}
            </select>
            <button @click="bulkUpdate({location_id: parseInt(bulkLocationVal) || null})" x-show="bulkLocationVal"
                    class="px-3 py-1 bg-shelf-accent text-white rounded-lg text-xs">Apply</button>
            <select x-model="bulkTypeVal" class="bg-shelf-bg border border-shelf-border rounded-lg px-2 py-1 text-sm text-shelf-text">
                <option value="">Change type...</option>
                {% for key, label in media_types.items() %}
                <option value="{{ key }}">{{ label }}</option>
                {% endfor %}
            </select>
            <button @click="bulkUpdate({media_type: bulkTypeVal})" x-show="bulkTypeVal"
                    class="px-3 py-1 bg-shelf-accent text-white rounded-lg text-xs">Apply</button>
            <select x-model="bulkStatusVal" class="bg-shelf-bg border border-shelf-border rounded-lg px-2 py-1 text-sm text-shelf-text">
                <option value="">Set status...</option>
                <option value="want_to_read">Want to Read</option>
                <option value="reading">Reading</option>
                <option value="read">Read</option>
                <option value="__clear__">Clear Status</option>
            </select>
            <button @click="bulkUpdate({reading_status: bulkStatusVal === '__clear__' ? '' : bulkStatusVal})" x-show="bulkStatusVal"
                    class="px-3 py-1 bg-shelf-accent text-white rounded-lg text-xs">Apply</button>
            <button @click="bulkDelete()" class="px-3 py-1 bg-shelf-error/20 text-shelf-error rounded-lg text-xs ml-auto">Delete Selected</button>
        </div>
    </div>

    <!-- Header + Filters -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div class="flex items-center gap-3">
            <h1 class="text-2xl font-bold">Collection <span id="collection-count" class="text-shelf-muted text-lg font-normal">({{ total_count }})</span></h1>
            <!-- View toggle -->
            <div class="flex items-center bg-shelf-card border border-shelf-border rounded-lg overflow-hidden" data-testid="view-toggle">
                <button @click="setView('grid')" :class="viewMode === 'grid' ? 'bg-shelf-accent/20 text-shelf-accent2' : 'text-shelf-muted hover:text-shelf-text'"
                        class="p-1.5 transition-colors" title="Grid view" data-testid="view-grid">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                </button>
                <button @click="setView('list')" :class="viewMode === 'list' ? 'bg-shelf-accent/20 text-shelf-accent2' : 'text-shelf-muted hover:text-shelf-text'"
                        class="p-1.5 transition-colors" title="List view" data-testid="view-list">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
            </div>
            <!-- Select mode -->
            <div class="relative" x-data="{ showSelectTip: false }">
                <button @click="selectMode = !selectMode; if(!selectMode) selectedIds = []; localStorage.setItem('shelf-select-used', '1')"
                        @mouseenter="showSelectTip = !localStorage.getItem('shelf-select-used')"
                        @mouseleave="showSelectTip = false"
                        :class="selectMode ? 'bg-shelf-accent/20 text-shelf-accent2' : 'bg-shelf-card text-shelf-muted'"
                        class="px-3 py-1 rounded-lg text-xs border border-shelf-border hover:border-shelf-accent/50 transition-colors">
                    <span x-text="selectMode ? 'Done' : 'Select'"></span>
                </button>
                <!-- First-use tooltip -->
                <div x-show="showSelectTip" x-transition
                     class="absolute top-full left-0 mt-2 w-48 bg-shelf-card border border-shelf-border rounded-lg p-2 shadow-xl z-50 text-xs text-shelf-muted">
                    Tap items to select them for bulk move, type change, status update, or delete.
                </div>
            </div>
            <template x-if="selectMode">
                <div class="flex items-center gap-1">
                    <button @click="selectAll()" class="px-2 py-1 rounded text-xs text-shelf-muted hover:text-shelf-accent2 transition-colors">Select All</button>
                    <button @click="deselectAll()" x-show="selectedIds.length > 0" class="px-2 py-1 rounded text-xs text-shelf-muted hover:text-shelf-accent2 transition-colors">Deselect All</button>
                </div>
            </template>
        </div>
        <!-- Filters: shown inline on large screens, collapsible on small -->
        <div class="flex items-center gap-2 sm:hidden">
            <button @click="filtersOpen = !filtersOpen"
                    class="flex items-center gap-1.5 px-3 py-2 bg-shelf-card border border-shelf-border rounded-lg text-sm text-shelf-muted hover:text-shelf-text transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                <span>Filters</span>
                <span x-show="filterPills.length > 0" class="bg-shelf-accent text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center" x-text="filterPills.length"></span>
            </button>
            <!-- Search always visible on mobile -->
            <input type="search" name="q" data-testid="search-input" placeholder="Search..." value="{{ initial_query or '' }}"
                   hx-get="/api/search" hx-trigger="keyup changed delay:300ms" hx-target="#item-grid"
                   hx-include="[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='owned'],[name='lent_out'],[name='view']"
                   class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent focus:border-transparent outline-none placeholder-shelf-muted/50 flex-1 min-w-0">
        </div>
        <div :class="filtersOpen ? 'flex' : 'hidden sm:flex'" class="flex-wrap items-center gap-3">
            <!-- Search (hidden on mobile since it's shown above) -->
            <input type="search" name="q" data-testid="search-input" placeholder="Search..." value="{{ initial_query or '' }}"
                   hx-get="/api/search" hx-trigger="keyup changed delay:300ms" hx-target="#item-grid"
                   hx-include="[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='owned'],[name='lent_out'],[name='view']"
                   class="hidden sm:block bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent focus:border-transparent outline-none placeholder-shelf-muted/50 w-48">

            {% set f = initial_filters or {} %}
            <!-- Media Type Filter -->
            <select id="type-filter" name="media_type_filter"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='owned'],[name='lent_out'],[name='view']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="" {{ 'selected' if not f.media_type_filter else '' }}>All Types ({{ total_count }})</option>
                {% for key, label in media_types.items() %}
                {% set count = type_counts.get(key, 0) %}
                {% if count > 0 %}
                <option value="{{ key }}" {{ 'selected' if f.media_type_filter == key else '' }}>{{ label }} ({{ count }})</option>
                {% endif %}
                {% endfor %}
            </select>

            <!-- Location Filter -->
            <select id="location-filter" name="location_filter"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='media_type_filter'],[name='sort'],[name='reading_status'],[name='owned'],[name='lent_out'],[name='view']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="" {{ 'selected' if not f.location_filter else '' }}>All Locations ({{ total_count }})</option>
                {% for loc in locations %}
                {% set lcount = location_counts.get(loc.id, 0) %}
                <option value="{{ loc.id }}" {{ 'selected' if f.location_filter == loc.id|string else '' }}>{{ loc.name }}{% if lcount %} ({{ lcount }}){% endif %}</option>
                {% endfor %}
            </select>

            <!-- Owned / Wishlist Filter -->
            <select id="owned-filter" name="owned"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='lent_out'],[name='view']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="" {{ 'selected' if not f.owned else '' }}>All ({{ total_count }})</option>
                <option value="1" {{ 'selected' if f.owned == '1' else '' }}>Owned ({{ owned_count }})</option>
                <option value="0" {{ 'selected' if f.owned == '0' else '' }}>Wishlist ({{ wishlist_count }})</option>
            </select>

            <!-- Lent Out Filter -->
            <select name="lent_out"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='owned'],[name='view']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="" {{ 'selected' if not f.lent_out else '' }}>All Items</option>
                <option value="1" {{ 'selected' if f.lent_out == '1' else '' }}>Lent Out{% if lent_out_count %} ({{ lent_out_count }}){% endif %}</option>
            </select>

            <!-- Reading Status Filter -->
            <select id="reading-status-filter" name="reading_status"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='owned'],[name='lent_out'],[name='view']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="" {{ 'selected' if not f.reading_status else '' }}>All Statuses</option>
                {% set rsc = reading_status_counts or {} %}
                <option value="want_to_read" {{ 'selected' if f.reading_status == 'want_to_read' else '' }}>Want to Read{% if rsc.get('want_to_read') %} ({{ rsc.want_to_read }}){% endif %}</option>
                <option value="reading" {{ 'selected' if f.reading_status == 'reading' else '' }}>Reading{% if rsc.get('reading') %} ({{ rsc.reading }}){% endif %}</option>
                <option value="read" {{ 'selected' if f.reading_status == 'read' else '' }}>Read{% if rsc.get('read') %} ({{ rsc.read }}){% endif %}</option>
            </select>

            <!-- Sort -->
            <select name="sort"
                    hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
                    hx-include="[name='q'],[name='media_type_filter'],[name='location_filter'],[name='reading_status'],[name='owned'],[name='lent_out'],[name='view']"
                    class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
                <option value="newest" {{ 'selected' if f.sort == 'newest' or not f.sort else '' }}>Most Recent</option>
                <option value="oldest" {{ 'selected' if f.sort == 'oldest' else '' }}>Oldest First</option>
                <option value="title_asc" {{ 'selected' if f.sort == 'title_asc' else '' }}>Title A–Z</option>
                <option value="title_desc" {{ 'selected' if f.sort == 'title_desc' else '' }}>Title Z–A</option>
                <option value="author" {{ 'selected' if f.sort == 'author' else '' }}>Author</option>
                <option value="year_desc" {{ 'selected' if f.sort == 'year_desc' else '' }}>Year (Newest)</option>
                <option value="year_asc" {{ 'selected' if f.sort == 'year_asc' else '' }}>Year (Oldest)</option>
            </select>
        </div>
    </div>

    <!-- Active Filter Pills -->
    <div x-show="filterPills.length > 0" x-transition class="flex flex-wrap items-center gap-2 mb-4">
        <template x-for="pill in filterPills" :key="pill.name">
            <span class="inline-flex items-center gap-1 px-2.5 py-1 bg-shelf-accent/10 text-shelf-accent2 border border-shelf-accent/20 rounded-full text-xs">
                <span x-text="pill.label"></span>
                <button @click="clearFilter(pill.name)" class="hover:text-shelf-text ml-0.5">&times;</button>
            </span>
        </template>
        <button @click="clearAllFilters()" class="text-xs text-shelf-muted hover:text-shelf-error transition-colors ml-1">Clear all</button>
    </div>

    <!-- Hidden view mode input for HTMX requests -->
    <input type="hidden" name="view" :value="viewMode">

    <!-- Item Grid -->
    <div id="item-grid">
        {% include "fragments/item_grid.html" %}
    </div>
</div>

<script src="/static/js/browse.js"></script>
{% endblock %}
