{% if filtered_total is defined %}
<span id="collection-count" hx-swap-oob="true" class="text-shelf-muted text-lg font-normal">({{ filtered_total }})</span>

<select id="type-filter" name="media_type_filter" hx-swap-oob="true"
        hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
        hx-include="[name='q'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='owned'],[name='lent_out'],[name='view']"
        class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
    <option value="" {{ 'selected' if not active_type else '' }}>All Types ({{ type_total }})</option>
    {% for key, label in media_types.items() %}
    {% set count = type_counts.get(key, 0) %}
    {% if count > 0 %}
    <option value="{{ key }}" {{ 'selected' if active_type == key else '' }}>{{ label }} ({{ count }})</option>
    {% endif %}
    {% endfor %}
</select>

<select id="owned-filter" name="owned" hx-swap-oob="true"
        hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
        hx-include="[name='q'],[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='reading_status'],[name='lent_out'],[name='view']"
        class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
    <option value="" {{ 'selected' if not active_owned else '' }}>All ({{ owned_count + wishlist_count }})</option>
    <option value="1" {{ 'selected' if active_owned == '1' else '' }}>Owned ({{ owned_count }})</option>
    <option value="0" {{ 'selected' if active_owned == '0' else '' }}>Wishlist ({{ wishlist_count }})</option>
</select>

{% if locations is defined %}
<select id="location-filter" name="location_filter" hx-swap-oob="true"
        hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
        hx-include="[name='q'],[name='media_type_filter'],[name='sort'],[name='reading_status'],[name='owned'],[name='lent_out'],[name='view']"
        class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
    <option value="" {{ 'selected' if not active_location else '' }}>All Locations ({{ filtered_total }})</option>
    {% for loc in locations %}
    {% set lcount = location_counts.get(loc.id, 0) if location_counts else 0 %}
    <option value="{{ loc.id }}" {{ 'selected' if active_location == loc.id|string else '' }}>{{ loc.name }}{% if lcount %} ({{ lcount }}){% endif %}</option>
    {% endfor %}
</select>
{% endif %}

{% if reading_status_counts is defined %}
{% set rsc = reading_status_counts or {} %}
<select id="reading-status-filter" name="reading_status" hx-swap-oob="true"
        hx-get="/api/search" hx-trigger="change" hx-target="#item-grid"
        hx-include="[name='q'],[name='media_type_filter'],[name='location_filter'],[name='sort'],[name='owned'],[name='lent_out'],[name='view']"
        class="bg-shelf-card border border-shelf-border rounded-lg px-3 py-2 text-sm text-shelf-text focus:ring-2 focus:ring-shelf-accent outline-none">
    <option value="" {{ 'selected' if not active_reading_status else '' }}>All Statuses</option>
    <option value="want_to_read" {{ 'selected' if active_reading_status == 'want_to_read' else '' }}>Want to Read{% if rsc.get('want_to_read') %} ({{ rsc.want_to_read }}){% endif %}</option>
    <option value="reading" {{ 'selected' if active_reading_status == 'reading' else '' }}>Reading{% if rsc.get('reading') %} ({{ rsc.reading }}){% endif %}</option>
    <option value="read" {{ 'selected' if active_reading_status == 'read' else '' }}>Read{% if rsc.get('read') %} ({{ rsc.read }}){% endif %}</option>
</select>
{% endif %}
{% endif %}
