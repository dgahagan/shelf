{% if items %}
<div class="cover-grid">
    {% for item in items %}
    {% include "fragments/item_card.html" %}
    {% endfor %}
    {% if has_more is defined and has_more %}
    <div id="load-more" class="col-span-full text-center py-4"
         hx-get="{{ load_more_url }}" hx-trigger="click" hx-swap="outerHTML">
        <button class="px-6 py-2 bg-shelf-card border border-shelf-border rounded-lg text-sm text-shelf-muted hover:text-shelf-text hover:border-shelf-accent/50 transition-colors">
            Load More
        </button>
    </div>
    {% endif %}
</div>
{% else %}
<div class="text-center py-20">
    <svg class="mx-auto mb-4 w-16 h-16 text-shelf-border" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
    </svg>
    <p class="text-shelf-muted text-lg mb-2">No items found</p>
    <a href="/scan" class="text-shelf-accent2 hover:text-shelf-accent inline-block">Start scanning books</a>
</div>
{% endif %}
