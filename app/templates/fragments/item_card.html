<a href="/item/{{ item.id }}" class="group relative" @click.prevent="selectMode ? toggleItem({{ item.id }}) : window.location='/item/{{ item.id }}'">
    <div class="cover-card bg-shelf-card rounded-lg overflow-hidden border border-shelf-border group-hover:border-shelf-accent/50 transition-colors shadow-lg"
         :class="selectedIds && selectedIds.includes({{ item.id }}) ? 'ring-2 ring-shelf-accent' : ''">
        {% if not item.owned %}
        <div class="absolute top-2 right-2 z-10 px-1.5 py-0.5 rounded text-[10px] font-medium bg-shelf-warning/90 text-black shadow">Wishlist</div>
        {% elif item.reading_status %}
        <div class="absolute top-2 right-2 z-10 w-3 h-3 rounded-full shadow
            {% if item.reading_status == 'read' %}bg-shelf-success
            {% elif item.reading_status == 'reading' %}bg-shelf-accent2
            {% elif item.reading_status == 'want_to_read' %}bg-shelf-warning{% endif %}"></div>
        {% endif %}
        <!-- Select checkbox -->
        <div x-show="selectMode" class="absolute top-2 left-2 z-10">
            <div class="w-5 h-5 rounded border-2 flex items-center justify-center text-xs"
                 :class="selectedIds.includes({{ item.id }}) ? 'bg-shelf-accent border-shelf-accent text-white' : 'border-shelf-border bg-black/40'">
                <span x-show="selectedIds.includes({{ item.id }})">&#10003;</span>
            </div>
        </div>
        {% if item.cover_path %}
        <img src="/{{ item.cover_path }}" alt="{{ item.title }}" loading="lazy">
        {% else %}
        <div class="w-full h-full flex flex-col items-center justify-center p-4 text-center bg-gradient-to-br from-shelf-card to-shelf-hover">
            <p class="text-shelf-text text-sm font-medium leading-tight mb-1">{{ item.title[:60] }}</p>
            {% if item.authors %}<p class="text-shelf-muted text-xs">{{ item.authors[:40] }}</p>{% endif %}
        </div>
        {% endif %}
    </div>
    <!-- Hover overlay with title -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent rounded-lg opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-3">
        <div class="min-w-0">
            <p class="text-white text-sm font-medium truncate">{{ item.title }}</p>
            {% if item.authors %}<p class="text-gray-300 text-xs truncate">{{ item.authors }}</p>{% endif %}
        </div>
    </div>
</a>
