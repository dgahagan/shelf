<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Shelf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        shelf: {
                            bg: '#0f1117', card: '#1a1d27', hover: '#242836',
                            accent: '#6366f1', accent2: '#818cf8',
                            text: '#e2e8f0', muted: '#94a3b8', border: '#2d3148',
                            error: '#ef4444',
                        }
                    }
                }
            }
        }
    </script>
    <style>body { background-color: #0f1117; color: #e2e8f0; }</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-shelf-accent2 tracking-tight">Shelf</h1>
            <p class="text-shelf-muted text-sm mt-1">Sign in to your library</p>
        </div>

        <form method="POST" action="/login" class="bg-shelf-card border border-shelf-border rounded-xl p-6 space-y-4">
            {% if error %}
            <div class="bg-shelf-error/10 border border-shelf-error/30 text-shelf-error text-sm rounded-lg px-4 py-2">
                {{ error }}
            </div>
            {% endif %}

            <div>
                <label for="username" class="block text-sm font-medium text-shelf-muted mb-1">Username</label>
                <input type="text" id="username" name="username" required autofocus
                    class="w-full bg-shelf-bg border border-shelf-border rounded-lg px-3 py-2 text-shelf-text focus:outline-none focus:border-shelf-accent focus:ring-1 focus:ring-shelf-accent">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-shelf-muted mb-1">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-shelf-bg border border-shelf-border rounded-lg px-3 py-2 text-shelf-text focus:outline-none focus:border-shelf-accent focus:ring-1 focus:ring-shelf-accent">
            </div>

            <button type="submit"
                class="w-full bg-shelf-accent hover:bg-shelf-accent2 text-white font-medium rounded-lg px-4 py-2 transition-colors">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
